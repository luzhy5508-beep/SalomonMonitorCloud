name: Salomon Monitor

on:
  schedule:
    # 每15分钟运行一次，可以根据需要调整
    # 更多关于 cron 表达式的信息: https://docs.github.com/cn/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron:  '*/15 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Salomon Monitor Script
      env:
        SERVERJ_SCKEY: ${{ secrets.SERVERJ_SCKEY }}
        KEYWORDS: ${{ secrets.KEYWORDS }}
      run: python SalomonMonitor.py
