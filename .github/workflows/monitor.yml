name: Salomon Monitor

on:
  schedule:
    # 每天中午 12:00 UTC 开始第一次运行，然后每 15 分钟运行一次
    # 中国时间 UTC+8，所以中午 12:00 UTC = 晚上 20:00 (8 PM) 中国时间
    # 但由于 GitHub Actions 的 cron 限制，我们使用 */15 * * * * 表示每 15 分钟运行一次
    # 如果需要精确控制首次运行时间，可以在 3 月 5 日手动触发
    - cron: '0 12 * * *'  # 每天中午 12:00 UTC 运行一次
    - cron: '*/15 * * * *' # 每 15 分钟运行一次
  
  workflow_dispatch: # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Salomon Monitor Script
      env:
        SERVERJ_SCKEY: ${{ secrets.SERVERJ_SCKEY }}
        KEYWORDS: ${{ secrets.KEYWORDS }}
      run: python SalomonMonitor.py
